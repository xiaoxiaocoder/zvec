name: WebAssembly Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  wasm-demo:
    name: Build WASM Demo (ailego distance)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.70
          actions-cache-folder: 'emsdk-cache'

      - name: Verify Emscripten
        run: |
          emcc --version
          emcmake --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install CMake & Ninja
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake==3.30.0 ninja==1.11.1

      - name: Configure WASM example
        run: |
          cd examples/wasm
          emcmake cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17

      - name: Build WASM example
        run: |
          cd examples/wasm
          cmake --build build -j$(nproc)

      - name: Prepare demo site
        run: |
          mkdir -p demo_site
          cp examples/wasm/index.html demo_site/
          cp examples/wasm/build/zvec_wasm.js demo_site/
          cp examples/wasm/build/zvec_wasm.wasm demo_site/
          ls -la demo_site/

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo_site

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-demo
          path: |
            examples/wasm/build/*.js
            examples/wasm/build/*.wasm
          if-no-files-found: warn

  deploy:
    if: github.ref == 'refs/heads/main'
    name: Deploy to GitHub Pages
    needs: wasm-demo
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  wasm-libs:
    name: Build WASM Libraries (experimental)
    runs-on: ubuntu-24.04
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        target: [zvec_ailego_static, zvec_core_static]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.70
          actions-cache-folder: 'emsdk-cache'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install CMake & Ninja
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake==3.30.0 ninja==1.11.1

      - name: Configure (Emscripten)
        run: |
          mkdir -p build_wasm
          emcmake cmake -S . -B build_wasm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DBUILD_ZVEC_SHARED=OFF \
            -DBUILD_ZVEC_AILEGO_SHARED=OFF \
            -DBUILD_ZVEC_CORE_SHARED=OFF \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_C_BINDINGS=OFF \
            -DBUILD_TOOLS=OFF \
            -DENABLE_WERROR=OFF \
            -DAUTO_DETECT_ARCH=OFF \
            -DRABITQ_ENABLE_AVX512=OFF \
            -DCMAKE_C_FLAGS="-s USE_PTHREADS=0 -s ALLOW_MEMORY_GROWTH=1" \
            -DCMAKE_CXX_FLAGS="-s USE_PTHREADS=0 -s ALLOW_MEMORY_GROWTH=1"

      - name: Build ${{ matrix.target }}
        run: |
          cmake --build build_wasm --target ${{ matrix.target }} -j$(nproc)

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ matrix.target }}
          path: |
            build_wasm/lib/*.a
          if-no-files-found: warn
